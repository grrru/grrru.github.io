<!-- 테마 토글 버튼 삽입 -->
<script>
    (function () {
        // 토글 스위치 생성
        const toggleWrapper = document.createElement('label');
        toggleWrapper.className = 'theme-switch';
        toggleWrapper.setAttribute('aria-label', 'Toggle theme');
        toggleWrapper.setAttribute('title', 'Toggle light/dark mode');

        toggleWrapper.innerHTML = `
            <input type="checkbox" id="theme-toggle-checkbox">
            <span class="slider">
                <svg class="icon moon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </span>
        `;

        const checkbox = toggleWrapper.querySelector('#theme-toggle-checkbox');

        // 현재 테마에 맞게 체크박스 설정
        function updateCheckbox() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            checkbox.checked = isDark;
        }

        // 테마 전환 함수
        checkbox.addEventListener('change', function () {
            const newTheme = this.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // body에 추가 (우측 하단 고정)
        document.body.appendChild(toggleWrapper);

        // 초기 상태 설정
        updateCheckbox();

        // 시스템 테마 변경 감지
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
                if (!localStorage.getItem('theme')) {
                    document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                    updateCheckbox();
                }
            });
        }
    })();
</script>
