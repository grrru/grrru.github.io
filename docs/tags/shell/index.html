<script>
    (function () {
        
        const toggleWrapper = document.createElement('label');
        toggleWrapper.className = 'theme-switch';
        toggleWrapper.setAttribute('aria-label', 'Toggle theme');
        toggleWrapper.setAttribute('title', 'Toggle light/dark mode');

        toggleWrapper.innerHTML = `
            <input type="checkbox" id="theme-toggle-checkbox">
            <span class="slider">
                <svg class="icon moon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </span>
        `;

        const checkbox = toggleWrapper.querySelector('#theme-toggle-checkbox');

        
        function updateCheckbox() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            checkbox.checked = isDark;
        }

        
        checkbox.addEventListener('change', function () {
            const newTheme = this.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        
        document.body.appendChild(toggleWrapper);

        
        updateCheckbox();

        
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
                if (!localStorage.getItem('theme')) {
                    document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                    updateCheckbox();
                }
            });
        }
    })();
</script>


<script>
    (function () {
        
        const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>`;

        
        const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>`;

        
        document.querySelectorAll('.highlight').forEach(function (highlightBlock) {
            
            if (highlightBlock.querySelector('.code-copy-btn')) return;

            
            const button = document.createElement('button');
            button.className = 'code-copy-btn';
            button.type = 'button';
            button.setAttribute('aria-label', 'Copy code to clipboard');
            button.innerHTML = copyIcon + '<span>Copy</span>';

            
            button.addEventListener('click', function () {
                
                const codeElement = highlightBlock.querySelector('code');
                if (!codeElement) return;

                
                let codeText = '';
                const lines = codeElement.querySelectorAll('.line');
                if (lines.length > 0) {
                    lines.forEach(function (line) {
                        codeText += line.textContent + '\n';
                    });
                } else {
                    codeText = codeElement.textContent;
                }

                
                navigator.clipboard.writeText(codeText.trim()).then(function () {
                    
                    button.innerHTML = checkIcon + '<span>Copied!</span>';
                    button.classList.add('copied');

                    
                    setTimeout(function () {
                        button.innerHTML = copyIcon + '<span>Copy</span>';
                        button.classList.remove('copied');
                    }, 2000);
                }).catch(function (err) {
                    console.error('Failed to copy code:', err);
                });
            });

            
            highlightBlock.appendChild(button);
        });
    })();
</script></body>
